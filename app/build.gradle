plugins {
    id 'com.android.application'
}

android {
    namespace 'com.juego.combates'
    compileSdk 34

    defaultConfig {
        applicationId "com.juego.combates"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

// Java puro: cero dependencias. Todo se dibuja con Canvas y la UI se construye en código.
dependencies {
}
